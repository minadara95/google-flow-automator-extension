<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Flow Automator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      width: 380px;
      background: #0f0f0f;
      color: #e0e0e0;
      padding: 16px;
    }

    h2 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    h2 span { font-size: 18px; }

    label {
      font-size: 12px;
      color: #aaa;
      display: block;
      margin-bottom: 6px;
    }

    textarea {
      width: 100%;
      height: 180px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 12px;
      padding: 10px;
      resize: vertical;
      outline: none;
      line-height: 1.5;
    }

    textarea:focus { border-color: #555; }
    textarea::placeholder { color: #555; }

    .url-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 12px;
    }

    .url-box.valid { border-color: #2e7d32; }
    .url-box.invalid { border-color: #c62828; }

    .url-box input {
      flex: 1;
      background: transparent;
      border: none;
      color: #e0e0e0;
      font-size: 11px;
      outline: none;
      min-width: 0;
    }

    .url-box input::placeholder { color: #555; }

    .url-status {
      font-size: 11px;
      flex-shrink: 0;
      color: #555;
    }

    .url-status.ok { color: #4caf50; }
    .url-status.err { color: #f44336; }

    .btn-go {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 6px;
      color: #bbb;
      font-size: 11px;
      padding: 4px 8px;
      cursor: pointer;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .btn-go:hover { background: #333; color: #fff; }

    .stats {
      font-size: 11px;
      color: #666;
      margin-top: 6px;
      min-height: 16px;
    }

    .stats b { color: #888; }

    .settings {
      display: flex;
      gap: 10px;
      margin: 12px 0;
    }

    .setting-item {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px 10px;
    }

    .setting-item label {
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }

    .setting-item input {
      width: 100%;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      outline: none;
    }

    .btn-start {
      width: 100%;
      padding: 11px;
      background: #4285f4;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-start:hover { background: #3367d6; }
    .btn-start:disabled { background: #333; color: #666; cursor: not-allowed; }

    .btn-stop {
      width: 100%;
      padding: 11px;
      background: #c62828;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      display: none;
    }

    .btn-stop:hover { background: #b71c1c; }

    #status-box {
      margin-top: 12px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px;
      min-height: 60px;
      display: none;
    }

    .progress-bar-bg {
      background: #2a2a2a;
      border-radius: 4px;
      height: 6px;
      margin-bottom: 8px;
      overflow: hidden;
    }

    .progress-bar {
      background: #4285f4;
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .status-text {
      font-size: 12px;
      color: #aaa;
      line-height: 1.5;
    }

    .status-text .label {
      color: #666;
      font-size: 11px;
    }

    .status-text .current-prompt {
      color: #ccc;
      font-size: 11px;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 340px;
    }

    .log-area {
      max-height: 100px;
      overflow-y: auto;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #2a2a2a;
    }

    .log-item {
      font-size: 11px;
      padding: 2px 0;
      display: flex;
      gap: 6px;
    }

    .log-item .icon { flex-shrink: 0; }
    .log-item.done .icon { color: #4caf50; }
    .log-item.running .icon { color: #ffc107; }
    .log-item.error .icon { color: #f44336; }
    .log-item .text { color: #999; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>
  <h2><span>🎨</span> Flow Prompt Automator</h2>

  <label>URL project Google Flow</label>
  <div class="url-box" id="url-box">
    <input type="text" id="url-input"
      placeholder="https://labs.google/fx/vi/tools/flow/project/..." />
    <span class="url-status" id="url-status">—</span>
    <button class="btn-go" id="btn-go">Mở tab</button>
  </div>

  <label>Danh sách prompt (phân cách bằng dòng trống)</label>
  <textarea id="prompts-input" placeholder="Prompt 1: A beautiful sunset over mountains...&#10;&#10;Prompt 2: A futuristic city at night...&#10;&#10;Prompt 3: ..."></textarea>
  <div class="stats" id="prompt-stats"></div>

  <div class="settings">
    <div class="setting-item">
      <label>Delay giữa các prompt (giây)</label>
      <input type="number" id="delay-input" value="5" min="2" max="60" />
    </div>
    <div class="setting-item">
      <label>Timeout chờ ảnh (giây)</label>
      <input type="number" id="timeout-input" value="90" min="30" max="300" />
    </div>
  </div>

  <button class="btn-start" id="btn-start">▶ Bắt đầu tự động</button>
  <button class="btn-stop" id="btn-stop">⏹ Dừng lại</button>

  <div id="status-box">
    <div class="progress-bar-bg">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="status-text">
      <span class="label">Tiến độ: </span>
      <span id="progress-text">0 / 0</span>
      <div class="current-prompt" id="current-prompt-text"></div>
    </div>
    <div class="log-area" id="log-area"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
